name: Nightly Release

on:
  # Build whenever you push to dev or main.
  push:
    branches: [dev, main]
  # Build every night at ~midnight UTC (adjust minute to avoid GitHub's peak times).
  schedule:
    - cron: "17 3 * * *"
  # Let you click "Run workflow" manually from the GitHub UI.
  workflow_dispatch:

# Give the workflow permission to create releases and move tags.
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Standard build: older glibc for max compatibility.
          - os: ubuntu-22.04
            feature-flag: ""
            suffix: ""
          # HEVC build: needs libheif >= 1.17, which Ubuntu 24.04 provides.
          # Slightly newer glibc, but HEVC users likely run modern distros anyway.
          - os: ubuntu-24.04
            feature-flag: "hevc"
            suffix: "-hevc"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libegl1-mesa-dev \
            libheif-dev \
            libde265-dev \
            cmake \
            build-essential \
            python3-dev

      - name: Restore ONNX Runtime build cache
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: /opt/onnxruntime-static
          key: onnxruntime-static-1.24.2-${{ matrix.os }}-${{ runner.arch }}

      - name: Build ONNX Runtime from source
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          ORT_VERSION=1.24.2
          git clone --recursive --depth 1 --branch "v${ORT_VERSION}" https://github.com/microsoft/onnxruntime.git /tmp/onnxruntime
          cd /tmp/onnxruntime
          ./build.sh \
            --config Release \
            --parallel \
            --compile_no_warning_as_error \
            --skip_tests \
            --disable_rtti \
            --cmake_extra_defines CMAKE_CXX_STANDARD=17
          sudo mkdir -p /opt/onnxruntime-static/lib /opt/onnxruntime-static/include
          sudo cp "build/Linux/Release/libonnxruntime.a" /opt/onnxruntime-static/lib/
          sudo cp -r include/* /opt/onnxruntime-static/include/

      - name: Expose ONNX Runtime to ort
        run: echo "ORT_LIB_PATH=/opt/onnxruntime-static" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: |
          if [ -n "${{ matrix.feature-flag }}" ]; then
            cargo build --release --features ${{ matrix.feature-flag }}
          else
            cargo build --release
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: akasha${{ matrix.suffix }}
          path: target/release/akasha
          if-no-files-found: error

  # Only publish a GitHub release once all builds finish successfully.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # We need full history to force-move the nightly tag.
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename artifacts
        run: |
          mv artifacts/akasha artifacts/akasha-linux-x86_64
          mv artifacts/akasha-hevc artifacts/akasha-hevc-linux-x86_64

      - name: Move the nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push -f origin nightly

      - name: Create/update Nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          body: |
            Automated nightly build from the latest `dev` branch.
            - Built on: ${{ github.sha }}
          prerelease: true
          files: artifacts/akasha*-linux-x86_64
          # Overwrite existing assets on the release rather than erroring.
          fail_on_unmatched_files: false
